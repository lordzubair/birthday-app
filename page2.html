<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday 🎂</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- 🎁 Gift Box -->
<div class="gift-container" onclick="openGift()">
    <div class="gift-box">
        <div class="lid"></div>
        <div class="box"></div>
    </div>
    <p>Tap to open your gift 🎁</p>
</div>

<!-- 🎉 Hidden Surprise Content -->
<div id="surpriseContent" style="display:none;">
    <div class="container">

        <div class="card">
            <h1 id="typingName"></h1>
            <p>
                You’re not just special… you’re unforgettable.  
                I’m really lucky to have you in my life.  
                Have an amazing year ahead ❤️
            </p>
        </div>

        <button onclick="startConfettiRain()">Celebrate 🎉</button>

    </div>
</div>

<!-- 🎉 Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- ✨ Typing Effect -->
<script>
let nameText = "Happy Birthday, Irtu ❤️";
let index = 0;

function typeName() {
    if (index < nameText.length) {
        document.getElementById("typingName").innerHTML += nameText.charAt(index);
        index++;
        setTimeout(typeName, 60);
    }
}
</script>

<!-- 🎁 Gift Open Logic -->
<script>
function openGift() {
    const box = document.querySelector(".gift-box");
    box.classList.add("open");

    setTimeout(() => {
        document.querySelector(".gift-container").style.display = "none";
        document.getElementById("surpriseContent").style.display = "block";

        // Start typing
        typeName();

        // Confetti burst 🎉
        confetti({
            particleCount: 200,
            spread: 120,
            origin: { y: 0.6 }
        });

    }, 700);
}

</script>

<!-- 🎉 Confetti Rain -->
<script>
function startConfettiRain() {
    const duration = 3 * 1000;
    const end = Date.now() + duration;

    (function frame() {
        confetti({
            particleCount: 5,
            angle: 60,
            spread: 55,
            origin: { x: 0 }
        });
        confetti({
            particleCount: 5,
            angle: 120,
            spread: 55,
            origin: { x: 1 }
        });

        if (Date.now() < end) {
            requestAnimationFrame(frame);
        }
    })();
}
</script>

</body>
</html>
